<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niskala Camera AR</title>

  <!-- THREE JS -->
  <script src="https://unpkg.com/three@0.150.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.150.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
    }

    #btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 20px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      z-index: 10;
    }
  </style>
</head>

<body>

<button id="btn">🚀 START</button>
<video id="video" autoplay playsinline></video>

<script>

let started = false;

document.getElementById("btn").onclick = () => {
  if (started) return;
  started = true;

  document.getElementById("btn").style.display = "none";

  startApp();
};

function startApp(){

  const video = document.getElementById("video");

  // 🎥 START CAMERA
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  })
  .then(stream => {
    video.srcObject = stream;
  })
  .catch(err => {
    alert("Camera error: " + err.message);
  });

  // 🎮 SCENE
  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.01,
    20
  );

  camera.position.z = 2;

  const renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  // 💡 LIGHT
  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  // 🟢 TEST CUBE (BIAR PASTI ADA YANG MUNCUL)
  const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
  const cube = new THREE.Mesh(geometry, material);
  cube.position.set(0, 0, -1);
  scene.add(cube);

  // 📦 LOAD MODEL
  const loader = new THREE.GLTFLoader();

  loader.load(
    "model.glb",
    (gltf) => {
      const model = gltf.scene;

      model.scale.set(2, 2, 2);      // BESARIN
      model.position.set(0, 0, -1);  // DEPAN KAMERA

      scene.add(model);

      console.log("MODEL LOADED");
    },
    undefined,
    (error) => {
      console.error("MODEL ERROR:", error);
      alert("Model gagal load!");
    }
  );

  // 🔁 LOOP
  function animate() {
    requestAnimationFrame(animate);

    cube.rotation.y += 0.01; // biar keliatan hidup

    renderer.render(scene, camera);
  }

  animate();
}

</script>

</body>
</html>
