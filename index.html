<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niskala AR Step 2</title>

  <script src="https://unpkg.com/three@0.150.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.150.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
    }

    #btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 20px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      z-index: 10;
    }
  </style>
</head>

<body>

<button id="btn">🚀 START</button>
<video id="video" autoplay playsinline></video>

<script>
document.getElementById("btn").onclick = () => {

  document.getElementById("btn").style.display = "none";

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  })
  .then(stream => {
    document.getElementById("video").srcObject = stream;
  });

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.01,
    20
  );

  camera.position.z = 2;

  const renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  // 🟢 CUBE (backup visual)
  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.5, 0.5),
    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
  );
  cube.position.set(-0.7, 0, -1);
  scene.add(cube);

  // 📦 LOAD MODEL
  const loader = new THREE.GLTFLoader();

  loader.load(
    "model.glb",
    (gltf) => {
      const model = gltf.scene;

      model.scale.set(2, 2, 2);        // BESARIN
      model.position.set(0.7, 0, -1);  // SEBELAH CUBE

      scene.add(model);

      console.log("MODEL MUNCUL 🔥");
    },
    undefined,
    (error) => {
      console.error(error);
      alert("Model gagal load!");
    }
  );

  function animate() {
    requestAnimationFrame(animate);

    cube.rotation.y += 0.02;

    renderer.render(scene, camera);
  }

  animate();
};
</script>

</body>
</html>
