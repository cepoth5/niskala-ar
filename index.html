<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niskala AR Trigger</title>

  <script src="https://unpkg.com/three@0.150.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.150.0/examples/js/loaders/GLTFLoader.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #video {
      position: fixed;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px;
      z-index: 3;
    }
  </style>
</head>

<body>

<button id="btn">START</button>
<video id="video" autoplay playsinline></video>

<script>
let model = null;
let scene, camera, renderer;

document.getElementById("btn").onclick = () => {

  document.getElementById("btn").style.display = "none";

  const video = document.getElementById("video");

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  })
  .then(stream => {
    video.srcObject = stream;
  });

  // SCENE
  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.01,
    20
  );

  camera.position.z = 2;

  renderer = new THREE.WebGLRenderer({ alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);

  renderer.domElement.style.position = "fixed";
  renderer.domElement.style.zIndex = "2";

  document.body.appendChild(renderer.domElement);

  // CUBE (backup)
  const cube = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.5, 0.5),
    new THREE.MeshBasicMaterial({ color: 0x00ff00 })
  );
  cube.position.set(0, 0, -1);
  scene.add(cube);

  // LOAD MODEL (TAPI BELUM DITAMPILKAN)
  const loader = new THREE.GLTFLoader();

  loader.load("model.glb", (gltf) => {
    model = gltf.scene;

    model.scale.set(2,2,2);
    model.position.set(0, 0, -1);

    console.log("MODEL READY 🔥");
  });

  // TAP UNTUK MUNCULKAN MODEL
  window.addEventListener("click", () => {
    if (model && !scene.children.includes(model)) {
      scene.add(model);
      console.log("MODEL DIMUNCULKAN 🚀");
    }
  });

  function animate() {
    requestAnimationFrame(animate);

    renderer.render(scene, camera);
  }

  animate();
};
</script>

</body>
</html>
